<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Soldat Web — Agents of Combat</title>
    <link rel="stylesheet" href="src/style.css">
</head>
<body>
    <div id="game-container">
        <!-- The Game Viewport (Three.js + HUD Canvas) -->
        <canvas id="gameCanvas"></canvas>
        <canvas id="hudCanvas"></canvas>

        <!-- UI Overlay for Menus -->
        <div id="ui-layer">

            <!-- MAIN MENU (TapTap Style) -->
            <div id="main-menu" class="menu-screen">
                <h1 class="game-title">SOLDAT <span>WEB</span></h1>
                <div class="version-tag">Alpha v0.2.0 — Agents of Combat</div>

                <div class="agent-card">
                  <label for="game-mode">MODO DE JOGO</label>
                  <select id="game-mode" class="taptap-select">
                    <option value="DEATHMATCH">TEAM DEATHMATCH</option>
                    <option value="CTF">CAPTURE A BANDEIRA</option>
                  </select>
                </div>

                <div class="agent-card">
                  <label for="player-name">IDENTIFICAÇÃO DO AGENTE</label>
                  <input type="text" id="player-name" value="GUEST_AGENT" maxlength="12">
                </div>

                <div class="btn-group">
                    <button id="btn-start" class="taptap-btn">
                      MISSÃO SOLO
                      <div class="sub-tag">LOCAL BOTS</div>
                    </button>
                    
                    <button id="btn-online" class="taptap-btn online">
                      OPERAR ONLINE
                      <div class="sub-tag">EM BREVE</div>
                    </button>

                    <button id="btn-settings" class="taptap-btn secondary">
                      OPÇÕES
                    </button>
                </div>
            </div>

            <!-- PAUSE MENU (ESC) — Handled in HUD.ts but we can style common classes here if needed -->
            <!-- The actual pause menu and G-menu are currently rendered on the 2D HUD Canvas for frame-perfect sync -->

            <!-- ORIENTATION HELPER (Mobile) -->
            <div id="orientation-overlay">
                <div class="rotate-icon">📱</div>
                <p>POR FAVOR, USE O MODO PAISAGEM</p>
                <span>A experiência de combate requer visão tática completa.</span>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="/src/main.ts"></script>
</body>
</html>
